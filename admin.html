<!DOCTYPE html>
<html>
<head>
    <title>JSM Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<script>
let pass = prompt("Enter Admin Password");

if (pass !== "jsm123") {
    document.body.innerHTML = "<h1>Access Denied</h1>";
}
</script>
<h1>JSM Milk Collection - Admin</h1>

<input
type="text"
id="farmerNo"
placeholder="Farmer No"
onchange="getFarmerName()">

<input type="text" id="name" placeholder="Name">
<br><br>



<input type="text" id="litre" placeholder="Litre">
<br><br>

<input type="text" id="fat" placeholder="Fat">
<br><br>
<label>Date</label>
<input type="date" id="date">
<br><br>



<label>Session</label>
<select id="session">
  <option value="morning">Morning</option>
  <option value="evening">Evening</option>
</select>
<br><br>
<input type="text" id="degree" placeholder="Degree">
<br><br>

<button onclick="saveFarmer()">
Save
</button>
<button onclick="loadRecord()">
Load Record
</button>
<button onclick="deleteRecord()">
Delete Record
</button>
<p id="msg"></p>

<script type="module" src="admin.js"></script>

</body>
</html>
